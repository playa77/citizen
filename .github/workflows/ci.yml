# Version: 1.0.0 | 2026-07-12
# Citizen CI pipeline — lint, type-check, and test
# Per-case monotonic eval gating added in WP-11

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: citizen
          POSTGRES_PASSWORD: citizen
          POSTGRES_DB: citizen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app/

      - name: Format check (ruff)
        run: ruff format --check app/

      - name: Type check (mypy)
        run: mypy app/

      - name: Unit tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///citizen_test.db
          OPENROUTER_API_KEY: ci-dummy-key
        run: pytest tests/unit/ -v

      - name: Integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://citizen:citizen@localhost:5432/citizen_test
          OPENROUTER_API_KEY: ci-dummy-key
        run: |
          alembic upgrade head
          pytest tests/integration/ -v
