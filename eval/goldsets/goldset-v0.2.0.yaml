- id: GS-010
  version: 1.0.0
  title: 'Alter Aufhebungs- und Erstattungsbescheid — Rechtsbehelfsbelehrung nennt ''zwei Wochen'': Jahresfrist läuft, Additionsfehler
    100 EUR'
  category: erstattung_fehlerhafte_rbb
  difficulty: mittel
  input_document:
    type: text
    text: |
      Jobcenter Essen
      BG-Nummer: 56102//0044120
      Team 514 — Herr Wieland

      Frau
      Carola Fitzek
      Rellinghauser Str. 200
      45136 Essen

      Essen, 09.02.2026

      Bescheid über die teilweise Aufhebung der Leistungsbewilligung
      und Erstattung

      Sehr geehrte Frau Fitzek,

      nach Auswertung des Datenabgleichs haben Sie im Zeitraum November
      2025 bis Januar 2026 Einkommen aus einer nicht angezeigten
      Nebentätigkeit (Minijob, Gebäudereinigung Klose GmbH) erzielt. Nach
      Anhörung vom 12.01.2026, zu der Sie sich nicht geäußert haben, wird
      die Bewilligung vom 20.10.2025 für die Monate November 2025 bis
      Januar 2026 gemäß § 48 Abs. 1 Satz 2 Nr. 3 SGB X i.V.m. § 40 Abs. 2
      Nr. 3 SGB II, § 330 Abs. 3 SGB III teilweise aufgehoben.

      Das anzurechnende Einkommen beträgt nach Abzug der Freibeträge
      monatlich 214,00 EUR.

      Aufhebungs- und Erstattungsbeträge:
        November 2025:   214,00 EUR
        Dezember 2025:   214,00 EUR
        Januar 2026:     214,00 EUR

      Gesamtforderung gemäß § 50 Abs. 1 SGB X:  742,00 EUR

      Bitte überweisen Sie den Betrag innerhalb eines Monats auf das Konto
      der Bundesagentur für Arbeit unter Angabe Ihrer BG-Nummer.

      Rechtsbehelfsbelehrung:
      Gegen diesen Bescheid kann innerhalb von zwei Wochen nach Bekanntgabe
      schriftlich Widerspruch beim Jobcenter Essen eingelegt werden.

      Im Auftrag
      Wieland
    aufgabe_zur_post: '2026-02-09'
    zusatzkontext_nutzer: |
      Frau Fitzek legt den Bescheid erst jetzt (Juli 2026) vor. Sie hat bisher keinen Widerspruch eingelegt und noch nichts gezahlt. Die Nebentätigkeit und die Einkommenshöhe bestreitet sie nicht.
    hinweis_fixture: |
      Dieser Fall testet die Jahresfrist-Erkennung: Ein naives System erklärt die Widerspruchsfrist für längst abgelaufen und verweist nur auf § 44 SGB X.
  expected:
    overall_assessment: teilweise_rechtswidrig
    summary: |
      Zwei Befunde: (1) Die Rechtsbehelfsbelehrung ist unrichtig ("zwei Wochen" statt eines Monats, § 84 Abs. 1 S. 1 SGG). Nach § 66 Abs. 2 SGG gilt daher die JAHRESFRIST: Der Widerspruch ist am Referenzdatum (11.07.2026) weiterhin zulässig — bis Montag, 15.02.2027 (ein Jahr ab Bekanntgabe 13.02.2026 = 13.02.2027, ein Samstag, verschoben nach § 64 Abs. 3 SGG). (2) Additionsfehler: 3 x 214,00 EUR = 642,00 EUR, gefordert werden 742,00 EUR — die Forderung ist um 100,00 EUR überhöht. Materiell ist die Aufhebung dem Grunde nach voraussichtlich rechtmäßig (unstreitiges, nicht gemeldetes Einkommen; gebundene Entscheidung; Anhörung durchgeführt). Realistisches Ziel des Widerspruchs: Reduktion auf 642,00 EUR plus ggf. Ratenzahlung.
    legal_issues:
    - id: GS-010-I1
      issue: Unrichtige Rechtsbehelfsbelehrung ('zwei Wochen') — Jahresfrist nach § 66 Abs. 2 SGG, Widerspruch weiterhin zulässig
      assessment: verfahrenshinweis_zentral
    - id: GS-010-I2
      issue: 'Additionsfehler: Summe der Monatsbeträge 642,00 EUR, gefordert 742,00 EUR — Forderung um 100,00 EUR überhöht'
      assessment: rechtswidrig_zulasten
    - id: GS-010-I3
      issue: Aufhebung dem Grunde nach voraussichtlich rechtmäßig (§ 48 Abs. 1 S. 2 Nr. 3 SGB X, unstreitiges Einkommen, Anhörung
        erfolgt, gebundene Entscheidung)
      assessment: ueberwiegend_rechtmaessig
    - id: GS-010-I4
      issue: Unabhängig vom Widerspruch bleibt der Überprüfungsantrag nach § 44 SGB X als Auffanglösung möglich
      assessment: hinweis
    citations:
    - norm: § 66 Abs. 2 SGG
      rolle: Jahresfrist bei unrichtiger Rechtsbehelfsbelehrung
    - norm: § 84 Abs. 1 S. 1 SGG
      rolle: richtige Frist wäre ein Monat
    - norm: § 64 Abs. 2, Abs. 3 SGG
      rolle: Fristende 13.02.2027 (Samstag) -> Montag, 15.02.2027
    - norm: § 48 Abs. 1 S. 2 Nr. 3 SGB X
      rolle: Aufhebung wegen Einkommenserzielung
    - norm: § 50 Abs. 1 SGB X
      rolle: Erstattung
    - norm: § 40 Abs. 2 Nr. 3 SGB II i.V.m. § 330 Abs. 3 SGB III
      rolle: gebundene Entscheidung
    - norm: § 44 SGB X
      rolle: Überprüfungsantrag als Auffanglösung
    calculation:
      input:
        monatsbetraege:
        - 214.0
        - 214.0
        - 214.0
      jobcenter_ergebnis:
        gesamtforderung: 742.0
      expected_korrekt:
        summe_korrekt: 642.0
        ueberhoehung: 100.0
    widerspruchsfrist:
      bescheid_datum: '2026-02-09'
      aufgabe_zur_post: '2026-02-09'
      bekanntgabe_fiktion: '2026-02-13'
      regulaere_frist_haette_geendet: '2026-03-13'
      rbb_fehlerhaft: true
      massgebliche_frist: jahresfrist_66_2_sgg
      frist_ende_rechnerisch: '2027-02-13'
      frist_ende: '2027-02-15'
      status_am_referenzdatum: offen
    known_traps:
    - 'Die Kernfalle: Bescheid ist fünf Monate alt — ein System ohne RBB-Prüfung meldet ''Frist abgelaufen, nur noch § 44
      SGB X''. Richtig ist: Jahresfrist läuft, Widerspruch ist der stärkere Rechtsbehelf (volle Überprüfung, aufschiebende
      Wirkung des Erstattungsteils).'
    - Fristende der Jahresfrist fällt auf Samstag (13.02.2027) — Werktag-Rollover über Jahresgrenze hinweg auf Montag, 15.02.2027.
    - Der deterministische Summencheck (642 statt 742) muss unabhängig vom LLM greifen — klassischer Fall für die Rechenwerk-Verifikation.
    - 'Ehrlichkeits-Kalibrierung: Materiell ist wenig zu holen (Einkommen unstreitig) — realistisches Ziel ist die Korrektur
      um 100 EUR, nicht die Aufhebung der Forderung.'
    actionable_next_steps:
    - Widerspruch einlegen (zulässig bis 15.02.2027) mit Verweis auf § 66 Abs. 2 SGG; Reduktion der Forderung auf 642,00 EUR
      verlangen.
    - Ratenzahlung für den verbleibenden Betrag anbieten; keine Zahlung vor Korrektur der Summe.
