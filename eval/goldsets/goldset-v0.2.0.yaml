- id: GS-002
  version: 1.0.0
  title: Endgültige Festsetzung mit Erstattungsforderung — Absetzbeträge vollständig vergessen
  category: endgueltige_festsetzung_41a
  difficulty: hoch
  input_document:
    type: text
    text: |
      Jobcenter Essen
      BG-Nummer: 56102//0051233
      Team 517 — Herr Okonkwo

      Frau
      Sabine Terhorst
      Frohnhauser Str. 88
      45143 Essen

      Essen, 15.06.2026

      Bescheid über die endgültige Festsetzung des Leistungsanspruchs
      und Erstattung nach § 41a SGB II
      Bewilligungszeitraum: 01.12.2025 bis 31.05.2026

      Sehr geehrte Frau Terhorst,

      mit Bescheid vom 24.11.2025 wurden Ihnen Leistungen für den o.g.
      Zeitraum wegen Ihres schwankenden Erwerbseinkommens vorläufig in Höhe
      von monatlich 400,00 EUR bewilligt (§ 41a Abs. 1 SGB II).

      Nach Vorlage Ihrer Lohnabrechnungen setze ich den Leistungsanspruch
      nunmehr endgültig fest (§ 41a Abs. 3 SGB II).

      Berechnung (monatlich, Durchschnitt des Bewilligungszeitraums):

      Bedarf:
        Regelbedarf (RBS 1)                          563,00 EUR
        Kosten der Unterkunft und Heizung            480,00 EUR
        Gesamtbedarf                               1.043,00 EUR

      Einkommen:
        Erwerbseinkommen (brutto, Durchschnitt)    1.000,00 EUR
        Erwerbseinkommen (netto, Durchschnitt)       820,00 EUR
        Anzurechnendes Einkommen                     820,00 EUR

      Endgültiger Anspruch: 1.043,00 EUR - 820,00 EUR = 223,00 EUR monatlich.

      Da Ihnen vorläufig 400,00 EUR monatlich gezahlt wurden, ergibt sich
      eine Überzahlung von 177,00 EUR monatlich, insgesamt

          1.062,00 EUR (6 Monate x 177,00 EUR).

      Diesen Betrag haben Sie gemäß § 41a Abs. 6 Satz 3 SGB II zu erstatten.
      Bitte überweisen Sie den Betrag innerhalb eines Monats nach
      Bestandskraft dieses Bescheides auf das unten genannte Konto.

      Rechtsbehelfsbelehrung:
      Gegen diesen Bescheid kann innerhalb eines Monats nach Bekanntgabe
      schriftlich oder zur Niederschrift Widerspruch beim Jobcenter Essen
      eingelegt werden.

      Im Auftrag
      Okonkwo
    aufgabe_zur_post: '2026-06-15'
  expected:
    overall_assessment: rechtswidrig
    summary: |
      Bei der endgültigen Festsetzung wurde das Nettoeinkommen ohne jegliche Absetzbeträge nach § 11b SGB II angerechnet. Korrekt sind 328,00 EUR Freibeträge; das anzurechnende Einkommen beträgt 492,00 EUR, der endgültige Anspruch 551,00 EUR/Monat. Statt einer Erstattung von 1.062,00 EUR ergibt sich eine NACHZAHLUNG von 906,00 EUR zugunsten der Leistungsberechtigten.
    legal_issues:
    - id: GS-002-I1
      issue: Absetzbeträge nach § 11b Abs. 2 und Abs. 3 SGB II bei der endgültigen Festsetzung vollständig unberücksichtigt
      assessment: rechtswidrig_zulasten
    - id: GS-002-I2
      issue: 'Vorzeichenumkehr: korrekte Festsetzung ergibt Nachzahlungsanspruch (§ 41a Abs. 6 S. 1-2 SGB II), keine Erstattung'
      assessment: rechtswidrig_zulasten
    - id: GS-002-I3
      issue: Rechtsgrundlage der Erstattung wäre § 41a Abs. 6 S. 3 SGB II (nicht § 50 SGB X) — hier im Ansatz korrekt zitiert,
        nur rechnerisch falsch
      assessment: hinweis
    citations:
    - norm: § 41a Abs. 1, 3, 6 SGB II
      rolle: vorläufige Bewilligung, endgültige Festsetzung, Erstattung/Nachzahlung
    - norm: § 41a Abs. 4 SGB II
      rolle: Durchschnittseinkommen im Bewilligungszeitraum
    - norm: § 11b Abs. 2 S. 1 SGB II
      rolle: Grundabsetzungsbetrag 100 EUR
    - norm: § 11b Abs. 3 S. 2 Nr. 1-2 SGB II
      rolle: 20%-/30%-Freibetragsbänder
    - norm: § 84 Abs. 1 S. 1 SGG
      rolle: Widerspruchsfrist
    - norm: § 64 Abs. 3 SGG
      rolle: Fristende an Sonntag -> nächster Werktag
    calculation:
      input:
        gesamtbedarf: 1043.0
        erwerbseinkommen_brutto_durchschnitt: 1000.0
        erwerbseinkommen_netto_durchschnitt: 820.0
        vorlaeufig_gezahlt_monatlich: 400.0
        monate: 6
      jobcenter_ergebnis:
        anzurechnendes_einkommen: 820.0
        endgueltiger_anspruch_monatlich: 223.0
        erstattungsforderung_gesamt: 1062.0
      expected_korrekt:
        grundabsetzung: 100.0
        fb_20_prozent_band: 84.0
        fb_30_prozent_band: 144.0
        freibetrag_gesamt: 328.0
        anzurechnendes_einkommen: 492.0
        endgueltiger_anspruch_monatlich: 551.0
        nachzahlung_monatlich: 151.0
        nachzahlung_gesamt: 906.0
        erstattungsforderung_korrekt: 0.0
    widerspruchsfrist:
      bescheid_datum: '2026-06-15'
      aufgabe_zur_post: '2026-06-15'
      bekanntgabe_fiktion: '2026-06-19'
      frist_ende_rechnerisch: '2026-07-19'
      frist_ende: '2026-07-20'
      status_am_referenzdatum: offen
    known_traps:
    - Fristende fällt rechnerisch auf Sonntag, 19.07.2026 — § 64 Abs. 3 SGG verschiebt auf Montag, 20.07.2026. Eine Engine
      ohne Werktag-Rollover meldet die Frist einen Tag zu früh.
    - Die Erstattung bei § 41a folgt aus § 41a Abs. 6 S. 3 SGB II, NICHT aus §§ 45/48/50 SGB X — es bedarf keiner Aufhebungsentscheidung;
      falsch wäre, hier eine fehlende Anhörung nach § 24 SGB X als tragenden Mangel zu behaupten.
    - 'Der zentrale Fehler ist rechnerisch, nicht dogmatisch: das System muss die komplette § 11b-Kaskade selbst nachrechnen
      statt die Jobcenter-Zahlen zu übernehmen.'
    actionable_next_steps:
    - Widerspruch bis 20.07.2026 (dringend — Referenzdatum 11.07.2026) mit vollständiger Gegenrechnung.
    - Nachzahlung von 906,00 EUR geltend machen; Zahlungsaufforderung zurückweisen.
