- id: GS-009
  version: 1.0.0
  title: Versagungsbescheid § 66 SGB I (Kontoauszüge) — Ermessensausfall, Schwärzungsrecht verkannt, Versagung ist keine Ablehnung
  category: versagung_66_sgb1
  difficulty: hoch
  input_document:
    type: text
    text: |
      Jobcenter Essen
      BG-Nummer: 56102//0058993
      Team 518 — Frau Nowak

      Herrn
      Ilja Petrenko
      Steele, Kaiser-Otto-Platz 4
      45276 Essen

      Essen, 29.06.2026

      Versagungsbescheid nach § 66 SGB I

      Sehr geehrter Herr Petrenko,

      Sie haben am 12.05.2026 die Weiterbewilligung von Leistungen nach dem
      SGB II beantragt. Mit Schreiben vom 26.05.2026 wurden Sie unter
      Fristsetzung bis zum 16.06.2026 aufgefordert, lückenlose Kontoauszüge
      der letzten drei Monate für Ihr Girokonto bei der ING vorzulegen.
      Auf die Rechtsfolgen fehlender Mitwirkung nach § 66 SGB I wurden Sie
      in diesem Schreiben hingewiesen.

      Die von Ihnen am 10.06.2026 eingereichten Kontoauszüge sind
      unvollständig, da auf der Ausgabenseite mehrere Buchungen geschwärzt
      wurden. Damit sind Sie Ihrer Mitwirkungspflicht nach §§ 60 ff. SGB I
      nicht nachgekommen.

      Die beantragten Leistungen werden daher ab dem 01.06.2026 wegen
      fehlender Mitwirkung in voller Höhe versagt.

      Rechtsbehelfsbelehrung:
      Gegen diesen Bescheid kann innerhalb eines Monats nach Bekanntgabe
      schriftlich oder zur Niederschrift Widerspruch beim Jobcenter Essen
      eingelegt werden.

      Im Auftrag
      Nowak
    aufgabe_zur_post: '2026-06-29'
    zusatzkontext_nutzer: |
      Herr Petrenko hat auf der Ausgabenseite drei Buchungen geschwärzt: einen Mitgliedsbeitrag an eine Gewerkschaft und zwei Spenden an eine Religionsgemeinschaft. Empfänger und Verwendungszweck wurden geschwärzt, die Beträge blieben lesbar. Alle Einnahmen sind vollständig sichtbar.
  expected:
    overall_assessment: rechtswidrig
    summary: |
      Die Versagung ist rechtswidrig. (1) Ermessensausfall: § 66 Abs. 1 SGB I ist eine Ermessensvorschrift ("kann ... versagen"); der Bescheid enthält keinerlei Ermessenserwägungen — das allein trägt die Aufhebung (§ 39 Abs. 1 SGB I, § 54 Abs. 2 S. 2 SGG). (2) Die Mitwirkungsgrenzen des § 65 SGB I sind verkannt: Die Vorlage von Kontoauszügen ist zwar grundsätzlich zumutbar, aber die Schwärzung des Empfängers auf der AUSGABENSEITE ist bei besonderen Kategorien personenbezogener Daten (hier: Gewerkschaftsbeitrag, religiöse Spenden) zulässig (BSG, Urt. v. 19.09.2008 - B 14 AS 45/07 R); Beträge blieben lesbar, Einnahmenseite vollständig — die Mitwirkung war damit ordnungsgemäß erbracht, der Versagungstatbestand liegt schon nicht vor. (3) Wichtig für die Beratung: Die Versagung ist KEINE Sachentscheidung über den Anspruch — sie sagt nichts darüber, ob ein Leistungsanspruch besteht. (4) Selbst nach bestandskräftiger Versagung können Leistungen nach Nachholung der Mitwirkung nachträglich erbracht werden (§ 67 SGB I, Ermessen).
    legal_issues:
    - id: GS-009-I1
      issue: 'Ermessensausfall: keine erkennbaren Ermessenserwägungen trotz Ermessensvorschrift § 66 Abs. 1 SGB I'
      assessment: rechtswidrig_zulasten
    - id: GS-009-I2
      issue: 'Versagungstatbestand nicht erfüllt: zulässige Schwärzung besonderer Datenkategorien auf der Ausgabenseite (BSG
        B 14 AS 45/07 R) — Mitwirkung war erbracht'
      assessment: rechtswidrig_zulasten
    - id: GS-009-I3
      issue: Formelle Voraussetzungen (schriftliche Fristsetzung mit Rechtsfolgenbelehrung, § 66 Abs. 3 SGB I) wurden eingehalten
        — kein Angriffspunkt
      assessment: rechtmaessig
    - id: GS-009-I4
      issue: Versagung ist keine Ablehnung — keine Entscheidung in der Sache; nach Nachholung der Mitwirkung nachträgliche
        Leistungserbringung nach § 67 SGB I möglich
      assessment: hinweis
    citations:
    - norm: § 66 Abs. 1, Abs. 3 SGB I
      rolle: Versagung wegen fehlender Mitwirkung — Ermessen, Fristsetzung mit Rechtsfolgenhinweis
    - norm: § 60 Abs. 1 SGB I
      rolle: 'Mitwirkungspflicht: Vorlage von Beweisurkunden (Kontoauszüge)'
    - norm: § 65 SGB I
      rolle: Grenzen der Mitwirkung
    - norm: BSG, Urt. v. 19.09.2008 - B 14 AS 45/07 R
      rolle: 'Kontoauszüge: Vorlage zumutbar, Schwärzung besonderer Daten auf der Ausgabenseite zulässig'
    - norm: § 67 SGB I
      rolle: nachträgliche Leistungserbringung nach Nachholung der Mitwirkung
    - norm: § 39 Abs. 1 SGB I, § 54 Abs. 2 S. 2 SGG
      rolle: gerichtliche Kontrolle von Ermessensentscheidungen / Ermessensausfall
    calculation:
      input:
        versagt_ab: '2026-06-01'
        potenzieller_anspruch_monatlich: 1043.0
      expected_korrekt:
        rechtmaessig_versagbar: 0.0
        hinweis: Keine Anspruchsberechnung im Versagungsfall — Versagung ist keine Sachentscheidung
    widerspruchsfrist:
      bescheid_datum: '2026-06-29'
      aufgabe_zur_post: '2026-06-29'
      bekanntgabe_fiktion: '2026-07-03'
      frist_ende: '2026-08-03'
      status_am_referenzdatum: offen
    known_traps:
    - 'Kategorienfehler-Falle: Versagung (§ 66 SGB I) und Ablehnung (Sachentscheidung) müssen strikt getrennt werden — eine
      Engine, die ''Anspruch abgelehnt'' formuliert, verfehlt die Rechtsnatur.'
    - Ermessensausfall ist der sicherste Aufhebungsgrund und darf nicht hinter der Schwärzungsfrage verschwinden.
    - 'Doppelstrategie: Widerspruch UND (vorsorglich) ungeschwärzte Unterlagen unter Protest bzw. Klärung anbieten — reiner
      Konfrontationskurs riskiert Leistungslücken.'
    actionable_next_steps:
    - 'Widerspruch bis 03.08.2026: Ermessensausfall und BSG-Rechtsprechung zur Schwärzung anführen.'
    - Parallel Zahlung der laufenden Leistungen anmahnen; bei Existenzgefährdung Eilantrag nach § 86b Abs. 2 SGG prüfen.
