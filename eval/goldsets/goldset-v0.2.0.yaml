goldset:
  id: goldset-sgb2-sgbx
  version: 0.2.0
  schema_version: 1.0.0
  created: 2026-07-13
  rechtsstand: '2026-07-11'
  evaluation_reference_date: '2026-07-11'
  legal_area: sozialrecht
  jurisdiction: DE
  bundesland_feiertage: NW
  language: de
  case_count: 12
  provenance: synthetic
  legal_baseline:
    reform_status:
      note: |
        13. Gesetz zur Änderung des SGB II ("neue Grundsicherung"), verkündet BGBl. 2026 I Nr. 107 vom 22.04.2026. Kernregelungen in Kraft seit 01.07.2026; einzelne Sanktionsregelungen bereits seit 23.04.2026. Leistung heißt "Grundsicherungsgeld"; Behörden dürfen bis Ende 2026 weiterhin "Bürgergeld" verwenden. Bestehende Bewilligungen laufen weiter und werden bei der nächsten Entscheidung nach neuem Recht fortgeführt.
    regelbedarf_2026:
      note: Nullrunde 2026 (Besitzschutz); Fortschreibungs-VO im BGBl. 22.10.2025
      rbs1_alleinstehend: 563.0
      rbs2_partner: 506.0
      geltung: 2024-01-01 bis mindestens 2026-12-31
    einkommen_absetzbetraege_11b:
      note: |
        § 11b SGB II unverändert durch die Reform. Grundabsetzungsbetrag 100 EUR (§ 11b Abs. 2 S. 1). Staffel nach § 11b Abs. 3 S. 2 (Bemessung am Brutto-Erwerbseinkommen, Absetzung vom Netto): 20 % für den Teil > 100 bis 520 EUR; 30 % für den Teil > 520 bis 1000 EUR (seit 01.07.2023); 10 % für den Teil > 1000 bis 1200 EUR (1500 EUR bei mind. einem minderjährigen Kind, § 11b Abs. 3 S. 3).
      grundabsetzung: 100.0
      staffel:
      - von: 100.01
        bis: 520.0
        prozent: 20
      - von: 520.01
        bis: 1000.0
        prozent: 30
      - von: 1000.01
        bis: 1200.0
        prozent: 10
    sanktionen_neues_recht:
      note: Rechtslage seit 01.07.2026 (tw. seit 23.04.2026)
      pflichtverletzung_31a:
        minderung_prozent_regelbedarf: 30
        dauer_monate: 3
        aufhebung: |
          Minderung ist aufzuheben, sobald Pflichten erfüllt werden oder ernsthafte und nachhaltige Bereitschaftserklärung erfolgt (§ 31a Abs. 1 S. 2 SGB II n.F.). Alte 10/20/30-Staffelung entfallen.
        kdu_schutz: KdU-Zahlbeträge dürfen nicht verringert werden (§ 31a Abs. 4 S. 2)
        anhoerung: persönliche Anhörung auf Verlangen / bei psych. Erkrankung (§ 31a Abs. 2)
      meldeversaeumnis_32:
        erstes_versaeumnis: NICHT sanktionsbewehrt (nur 'wiederholtes' Versäumnis)
        ab_zweitem_versaeumnis: 30 % des Regelbedarfs für 1 Monat (§ 32 Abs. 1 S. 1 n.F.)
      drei_versaeumnisse_32a: |
        Entzug des Regelbedarfs nach drei aufeinanderfolgenden Meldeversäumnissen (§ 32a n.F.); KdU und KV laufen weiter; wichtiger Grund: Darlegung genügt. Anschließend Nichterreichbarkeitsfiktion (§ 7b Abs. 4) mit vollständigem Anspruchsentfall möglich; 1-Euro-Bewilligung nach § 31a Abs. 4 S. 3.
      aufschiebende_wirkung: |
        Widerspruch gegen Minderungs-/Aufhebungs-/Entziehungsbescheide hat KEINE aufschiebende Wirkung (§ 39 Nr. 1 SGB II); gegen reine Erstattungsbescheide hingegen schon (§ 86a Abs. 1 SGG).
    vermoegen_intertemporal:
      altes_recht_bis_2026_06_30: |
        § 12 SGB II a.F.: Karenzzeit 12 Monate mit 40.000 EUR Freibetrag für die erste Person (+15.000 EUR je weitere Person); nach Karenzzeit 15.000 EUR pro Person. Gefördertes Altersvorsorgevermögen privilegiert.
      neues_recht_ab_2026_07_01: |
        Karenzzeit beim Vermögen ersatzlos gestrichen; altersgestaffelte Freibeträge ab dem ersten Tag. ACHTUNG: Die exakten Altersstufen- Beträge werden in Sekundärquellen uneinheitlich berichtet (ca. 5.000–20.000 EUR) und sind vor produktiver Nutzung gegen den BGBl.-Text / die BMAS-Ausführungsbestimmungen zu verifizieren. Kein Fixture macht diese Beträge zur Ground Truth.
    kdu:
      karenzzeit: |
        12-monatige KdU-Karenzzeit besteht fort (Unterkunft, nicht Heizung), seit 01.07.2026 jedoch gedeckelt auf das 1,5-fache der kommunalen Angemessenheitsgrenze (§ 22 Abs. 1 SGB II n.F.).
      kostensenkungsaufforderung: |
        Kein Verwaltungsakt, sondern Aufklärung/Warnung mit Informations- funktion (st. Rspr. BSG, z.B. Urt. v. 19.02.2009 - B 4 AS 30/08 R); Widerspruch dagegen unstatthaft.
    fristen_model:
      bekanntgabefiktion: |
        Schriftlicher VA gilt am VIERTEN Tag nach Aufgabe zur Post als bekannt gegeben (§ 37 Abs. 2 S. 1 SGB X; "drei" -> "vier" Tage durch Art. 33 PostModG zum 01.01.2025, weitere Folgeänderung durch SGB VI-AnpG zum 24.12.2025). Ausnahme: tatsächlich späterer Zugang / Zweifel.
      widerspruchsfrist: |
        Ein Monat nach Bekanntgabe (§ 84 Abs. 1 S. 1 SGG). Fristberechnung nach § 64 SGG: Beginn am Tag nach Bekanntgabe (Abs. 1); Ende mit Ablauf des Tages des Folgemonats, der dem Bekanntgabetag entspricht (Abs. 2); fällt das Ende auf Samstag, Sonntag oder Feiertag, endet die Frist mit Ablauf des nächsten Werktags (Abs. 3).
      jahresfrist: |
        Bei fehlender oder unrichtiger Rechtsbehelfsbelehrung: ein Jahr (§ 66 Abs. 2 SGG).
      design_note: |
        Alle Fixture-Daten sind so gewählt, dass der 4. Tag nach Postaufgabe auf einen Werktag fällt. Die umstrittene Frage, ob sich die Bekanntgabefiktion bei Wochenende/Feiertag auf den nächsten Werktag verschiebt, ist damit bewusst NICHT load-bearing (siehe open_questions) — sie taucht nur als known_trap auf.
    kalender_2026_anker:
    - 2026-07-11 = Samstag (Referenzdatum)
    - 'Feiertage NRW H1/2026 u.a.: 03.04 Karfreitag, 05./06.04 Ostern, 01.05, 14.05 Himmelfahrt, 25.05 Pfingstmontag, 04.06
      Fronleichnam'
  open_questions:
  - id: OQ-1
    topic: Bekanntgabefiktion an Sa/So/Feiertag
    note: |
      Ob der 4-Tages-Zeitraum des § 37 Abs. 2 SGB X bei Fristende an einem Sa/So/Feiertag auf den nächsten Werktag verlängert wird, ist umstritten (aktuell z.B. LSG NRW, 20.05.2026 - L 2 AS 1639/25: Fiktion gilt auch an Sonn-/Feiertagen). Fixtures vermeiden die Konstellation; Engine sollte beide Auslegungen kennzeichnen können.
  - id: OQ-2
    topic: Dauer des Regelbedarfs-Entzugs bei Arbeitsverweigerung (§ 31a Abs. 7 n.F.)
    note: |
      Sekundärquellen berichten uneinheitlich (2 vs. 3 Monate; Aufhebung nach § 31b Abs. 3 bei Wegfall der Arbeitsmöglichkeit). Vor Nutzung als Ground Truth gegen BGBl. 2026 I Nr. 107 verifizieren. Kein Fixture macht die Dauer zur Ground Truth.
  - id: OQ-3
    topic: Altersstaffel-Beträge Schonvermögen § 12 SGB II n.F.
    note: Siehe legal_baseline.vermoegen_intertemporal — gegen Primärquelle prüfen.
  evaluation_guide:
    issue_recall: Anteil der expected.legal_issues[].id, die die Pipeline als Claim identifiziert
    citation_precision: Anteil der Pipeline-Zitate, die in expected.citations[] (oder deren Obermenge im Fixture-Kontext)
      vorkommen; halluzinierte Normen zählen doppelt negativ
    calculation_exact_match: Alle Beträge in expected.calculation.expected_* müssen centgenau reproduziert werden
    frist_exact_match: expected.widerspruchsfrist.frist_ende (ISO-Datum) bzw. Sonderwert 'kein_verwaltungsakt'
    assessment_match: expected.overall_assessment in {rechtswidrig, teilweise_rechtswidrig, ueberwiegend_rechtmaessig, kein_verwaltungsakt}
