- id: GS-007
  version: 1.0.0
  title: Kostensenkungsaufforderung — kein Verwaltungsakt; KdU-Karenzzeit läuft noch, 1,5-fach-Deckel nicht überschritten
  category: kdu_kostensenkung
  difficulty: hoch
  input_document:
    type: text
    text: |
      Jobcenter Essen
      BG-Nummer: 56102//0055871
      Team 513 — Frau Öztürk

      Herrn
      Marek Dombrowski
      Gelsenkirchener Str. 51
      45309 Essen

      Essen, 29.06.2026

      Aufforderung zur Senkung der Unterkunftskosten

      Sehr geehrter Herr Dombrowski,

      Sie beziehen seit dem 01.02.2026 Leistungen nach dem SGB II. Für Ihre
      Wohnung entstehen monatliche Aufwendungen von 720,00 EUR
      Bruttokaltmiete zuzüglich 95,00 EUR Heizkosten.

      Nach dem schlüssigen Konzept der Stadt Essen beträgt die
      Angemessenheitsgrenze für einen Ein-Personen-Haushalt derzeit
      589,00 EUR Bruttokaltmiete. Ihre Unterkunftskosten sind damit
      unangemessen hoch.

      Ich fordere Sie auf, Ihre Unterkunftskosten bis zum 31.12.2026 auf
      das angemessene Maß zu senken, z. B. durch Wohnungswechsel,
      Untervermietung oder Verhandlung mit dem Vermieter. Bitte weisen Sie
      Ihre Bemühungen nach.

      Nach Ablauf dieser Frist können nur noch die angemessenen
      Aufwendungen in Höhe von 589,00 EUR zuzüglich angemessener
      Heizkosten anerkannt werden.

      Mit freundlichen Grüßen
      Im Auftrag
      Öztürk
    aufgabe_zur_post: '2026-06-29'
  expected:
    overall_assessment: kein_verwaltungsakt
    summary: |
      Die Kostensenkungsaufforderung ist nach st. Rspr. des BSG (z.B. Urt. v. 19.02.2009 - B 4 AS 30/08 R) KEIN Verwaltungsakt, sondern ein Informationsschreiben mit Aufklärungs- und Warnfunktion. Ein Widerspruch ist unstatthaft; eine Widerspruchsfrist läuft nicht. Materiell ist die Absenkungsankündigung zudem verfrüht: Herr Dombrowski befindet sich seit 01.02.2026 in der 12-monatigen KdU-Karenzzeit (bis 31.01.2027), in der die tatsächliche Bruttokaltmiete anzuerkennen ist, seit 01.07.2026 gedeckelt auf das 1,5-fache der Angemessenheitsgrenze (883,50 EUR) — 720,00 EUR liegen darunter. Eine Absenkung zum 01.01.2027 (noch innerhalb der Karenzzeit) wäre rechtswidrig; die Heizkosten unterliegen nicht der Karenzzeit, sondern eigener Angemessenheitsprüfung.
    legal_issues:
    - id: GS-007-I1
      issue: Keine Verwaltungsaktqualität der Kostensenkungsaufforderung — Widerspruch unstatthaft, keine Frist
      assessment: verfahrenshinweis_zentral
    - id: GS-007-I2
      issue: KdU-Karenzzeit (01.02.2026–31.01.2027) läuft; angekündigte Absenkung ab 01.01.2027 fiele in die Karenzzeit und
        wäre rechtswidrig
      assessment: rechtswidrig_zulasten
    - id: GS-007-I3
      issue: '1,5-fach-Deckel während der Karenzzeit (seit 01.07.2026): 1,5 x 589,00 = 883,50 EUR > 720,00 EUR — tatsächliche
        Bruttokaltmiete ist weiter zu übernehmen'
      assessment: rechtmaessig_zugunsten
    - id: GS-007-I4
      issue: Heizkosten (95,00 EUR) sind von der Karenzzeit ausgenommen und separat auf Angemessenheit zu prüfen
      assessment: hinweis
    citations:
    - norm: § 22 Abs. 1 SGB II n.F.
      rolle: KdU-Karenzzeit 12 Monate; Deckel 1,5-fache Angemessenheitsgrenze
    - norm: BSG, Urt. v. 19.02.2009 - B 4 AS 30/08 R
      rolle: 'Kostensenkungsaufforderung: Aufklärungs- und Warnfunktion, kein VA (st. Rspr.)'
    - norm: § 31 SGB X
      rolle: Verwaltungsakt-Begriff (Regelungswirkung fehlt)
    - norm: § 62 SGG / § 78 SGG
      rolle: Statthaftigkeit des Widerspruchs nur gegen VA
    calculation:
      input:
        bruttokaltmiete: 720.0
        heizkosten: 95.0
        angemessenheitsgrenze: 589.0
        leistungsbeginn: '2026-02-01'
      expected_korrekt:
        karenzzeit_ende: '2027-01-31'
        deckel_1_5_fach: 883.5
        in_karenzzeit_anzuerkennen_bruttokalt: 720.0
        angekuendigte_kuerzung_ab_2027_01: rechtswidrig
    widerspruchsfrist:
      frist_ende: kein_verwaltungsakt
      begruendung: Kein VA — keine Widerspruchsfrist; Rechtsschutz erst gegen einen späteren Absenkungs-/Bewilligungsbescheid
      status_am_referenzdatum: nicht_anwendbar
    known_traps:
    - 'Frist-Engine-Edgecase: Die korrekte Ausgabe ist ''keine Widerspruchsfrist — kein Verwaltungsakt''. Eine Engine, die
      reflexhaft 4 Tage + 1 Monat rechnet, fällt durch.'
    - 'Trotz fehlender VA-Qualität ist das Schreiben NICHT folgenlos: Es setzt die Obliegenheit zur Kostensenkung in Gang
      — Untätigkeit wäre falscher Rat. Reagieren und Bemühungen dokumentieren.'
    - Karenzzeit-Deckel (1,5x) ist neues Recht seit 01.07.2026 — Alt-Wissen kennt die unbegrenzte Karenzzeit-Anerkennung.
    - 589,00 EUR ist ein fiktiver Fixture-Wert, keine reale Essener Angemessenheitsgrenze — die Engine soll den Wert aus dem
      Dokument übernehmen, nicht aus Weltwissen 'korrigieren'.
    actionable_next_steps:
    - 'Kein Widerspruch (unstatthaft); stattdessen schriftlich antworten: auf laufende Karenzzeit bis 31.01.2027 und den 1,5-fach-Deckel
      hinweisen.'
    - Kostensenkungsbemühungen ab sofort dokumentieren (Schutz für die Zeit nach der Karenzzeit).
    - Gegen einen künftigen Bescheid mit abgesenkten KdU dann fristgerecht Widerspruch einlegen.
