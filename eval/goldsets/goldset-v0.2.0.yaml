- id: GS-006
  version: 1.0.0
  title: Minderungsbescheid 30 % / 3 Monate wegen fehlender Eigenbemühungen — neue Aufhebungsregel des § 31a Abs. 1 S. 2 übersehen
  category: minderung_pflichtverletzung_31a
  difficulty: hoch
  input_document:
    type: text
    text: |
      Jobcenter Essen
      BG-Nummer: 56102//0050944
      Team 516 — Herr Lindqvist

      Frau
      Jessica Kaminski
      Katernberger Str. 107
      45327 Essen

      Essen, 06.07.2026

      Bescheid über die Minderung des Grundsicherungsgeldes wegen einer
      Pflichtverletzung (§§ 31, 31a SGB II)

      Sehr geehrte Frau Kaminski,

      in Ihrem Kooperationsplan vom 12.05.2026 war vereinbart, dass Sie
      monatlich sechs Bewerbungen um sozialversicherungspflichtige
      Beschäftigungen nachweisen. Über die Rechtsfolgen einer
      Pflichtverletzung wurden Sie schriftlich belehrt.

      Für den Monat Juni 2026 haben Sie trotz Erinnerung vom 22.06.2026
      keine Bewerbungsnachweise vorgelegt. Einen wichtigen Grund haben Sie
      nicht dargelegt.

      Ihr Grundsicherungsgeld wird daher gemäß § 31a Abs. 1 SGB II um
      30 Prozent des maßgebenden Regelbedarfs gemindert. Die Minderung
      beträgt monatlich 168,90 EUR und gilt für die Dauer von drei Monaten
      (§ 31b SGB II), somit für die Monate August bis Oktober 2026,
      insgesamt 506,70 EUR.

      Die Bedarfe für Unterkunft und Heizung werden durch die Minderung
      nicht berührt.

      Hinweis: Ihr Widerspruch hat gemäß § 39 SGB II keine aufschiebende
      Wirkung.

      Rechtsbehelfsbelehrung:
      Gegen diesen Bescheid kann innerhalb eines Monats nach Bekanntgabe
      schriftlich oder zur Niederschrift Widerspruch beim Jobcenter Essen
      eingelegt werden.

      Im Auftrag
      Lindqvist
    aufgabe_zur_post: '2026-07-06'
    zusatzkontext_nutzer: |
      Frau Kaminski hat die sechs Bewerbungen für Juni inzwischen (am 08.07.2026) nachgeholt und beim Jobcenter eingereicht; sie erklärt, künftig fristgerecht nachzuweisen.
  expected:
    overall_assessment: teilweise_rechtswidrig
    summary: |
      Die Minderung ist dem Grunde nach nach neuem Recht möglich (Pflichtverletzung nach § 31 SGB II n.F.: fehlender Nachweis vereinbarter Eigenbemühungen; Rechtsfolge 30 % ohne Stufung, Belehrung erfolgt, KdU korrekt verschont). ABER: Nach § 31a Abs. 1 S. 2 SGB II n.F. ist die Minderung AUFZUHEBEN, sobald die Pflichten erfüllt werden oder eine ernsthafte, nachhaltige Bereitschafts- erklärung erfolgt. Beides ist am 08.07.2026 geschehen. Die Minderung darf daher für August–Oktober nicht (mehr) vollzogen werden; der Fortbestand des Bescheides ab Pflichterfüllung ist rechtswidrig. Zusätzlich besteht auf Verlangen ein Anspruch auf persönliche Anhörung vor Feststellung (§ 31a Abs. 2 S. 1).
    legal_issues:
    - id: GS-006-I1
      issue: Minderungstatbestand (§ 31 SGB II n.F., fehlender Eigenbemühungsnachweis aus Kooperationsplan) und Rechtsfolge
        30 % / 3 Monate zutreffend; Rechtsfolgenbelehrung erfolgt
