- id: GS-004
  version: 1.0.0
  title: Rücknahme wegen verschwiegenen Vermögens — auf § 48 statt § 45 SGB X gestützt (Austausch möglich, Erfolgsaussichten
    gering)
  category: ruecknahme_45
  difficulty: hoch
  input_document:
    type: text
    text: |
      Jobcenter Essen
      BG-Nummer: 56102//0049502
      Team 519 — Herr Vosskuhle

      Frau
      Renate Gierschner
      Rüttenscheider Str. 145
      45130 Essen

      Essen, 22.06.2026

      Bescheid über die Aufhebung der Leistungsbewilligung und Erstattung

      Sehr geehrte Frau Gierschner,

      mit Bescheid vom 21.11.2025 wurden Ihnen auf Ihren Antrag vom
      05.11.2025 Leistungen nach dem SGB II für den Zeitraum 01.12.2025 bis
      31.05.2026 in Höhe von monatlich 1.043,00 EUR bewilligt.

      Durch den automatisierten Datenabgleich nach § 52 SGB II wurde am
      04.05.2026 bekannt, dass Sie bereits zum Zeitpunkt der Antragstellung
      über ein Wertpapierdepot bei der Comdirect mit einem Guthaben von
      58.000,00 EUR verfügten. In Ihrem Antrag (Anlage VM) hatten Sie die
      Frage nach Wertpapieren, Fonds und Depots verneint.

      Ihr Vermögen überstieg damit von Beginn an den während der Karenzzeit
      maßgebenden Freibetrag von 40.000,00 EUR (§ 12 Abs. 4 SGB II in der
      bis 30.06.2026 geltenden Fassung). Hilfebedürftigkeit lag nicht vor.

      Die Bewilligung wird daher gemäß § 48 Abs. 1 Satz 2 Nr. 3 SGB X wegen
      einer wesentlichen Änderung der Verhältnisse vollständig für die Zeit
      vom 01.12.2025 bis 31.05.2026 aufgehoben.

      Die überzahlten Leistungen in Höhe von

          6.258,00 EUR (6 Monate x 1.043,00 EUR)

      haben Sie gemäß § 50 Abs. 1 SGB X zu erstatten.

      Auf Ihr Schreiben vom 26.05.2026 im Rahmen der Anhörung wird Bezug
      genommen; Ihre Einwände greifen nicht durch.

      Rechtsbehelfsbelehrung:
      Gegen diesen Bescheid kann innerhalb eines Monats nach Bekanntgabe
      schriftlich oder zur Niederschrift Widerspruch beim Jobcenter Essen
      eingelegt werden.

      Im Auftrag
      Vosskuhle
    aufgabe_zur_post: '2026-06-22'
  expected:
    overall_assessment: ueberwiegend_rechtmaessig
    summary: |
      Materiell ist der Bescheid voraussichtlich haltbar: Das Depot bestand bereits bei Antragstellung, überstieg den Karenzzeit-Freibetrag von 40.000 EUR (§ 12 Abs. 4 SGB II a.F., anwendbar für den Bewilligungszeitraum bis 05/2026), wurde verschwiegen — kein Vertrauensschutz (§ 45 Abs. 2 S. 3 Nr. 2 SGB X). Der Bescheid ist aber auf die FALSCHE Rechtsgrundlage gestützt: Bei anfänglicher Rechtswidrigkeit gilt § 45 SGB X, nicht § 48 SGB X. Nach st. Rspr. des BSG kann die Rechtsgrundlage im Widerspruchs-/Klageverfahren ausgetauscht werden, da die Rücknahme im SGB II gebundene Entscheidung ist (§ 40 Abs. 2 Nr. 3 SGB II i.V.m. § 330 Abs. 2 SGB III) und sich der Verfügungssatz nicht ändert. Ehrliche Erfolgsprognose: gering. Prüfwürdig bleiben Verwertbarkeit des Depots, die Jahresfrist (§ 45 Abs. 4 S. 2 SGB X: Kenntnis 04.05.2026 — gewahrt) und die Höhe.
    legal_issues:
    - id: GS-004-I1
      issue: 'Falsche Rechtsgrundlage: anfängliche Rechtswidrigkeit -> § 45 SGB X statt § 48 SGB X; Austausch der Rechtsgrundlage
        im Widerspruchsverfahren zulässig (gebundene Entscheidung, identischer Verfügungssatz)'
      assessment: formell_fehlerhaft_austauschbar
    - id: GS-004-I2
      issue: Kein Vertrauensschutz wegen vorsätzlich/grob fahrlässig unvollständiger Angaben (§ 45 Abs. 2 S. 3 Nr. 2 SGB X);
        Rücknahme auch für die Vergangenheit (§ 45 Abs. 4 S. 1 SGB X)
      assessment: rechtmaessig
    - id: GS-004-I3
      issue: Jahresfrist § 45 Abs. 4 S. 2 SGB X ab Kenntnis (04.05.2026) gewahrt
      assessment: rechtmaessig
    - id: GS-004-I4
      issue: Anhörung nach § 24 SGB X wurde durchgeführt — kein Verfahrensmangel
      assessment: rechtmaessig
    - id: GS-004-I5
      issue: Anwendung alten Vermögensrechts (Karenzzeit/40.000 EUR) auf den Bewilligungszeitraum bis 05/2026 zutreffend —
        neues Recht ab 01.07.2026 wirkt nicht zurück
      assessment: rechtmaessig
    citations:
    - norm: § 45 Abs. 1, Abs. 2 S. 3 Nr. 2, Abs. 4 SGB X
      rolle: Rücknahme eines anfänglich rechtswidrigen begünstigenden VA
    - norm: § 48 SGB X
      rolle: vom Jobcenter fälschlich herangezogen (nur für nachträgliche Änderung)
    - norm: § 40 Abs. 2 Nr. 3 SGB II i.V.m. § 330 Abs. 2 SGB III
      rolle: gebundene Entscheidung — ermöglicht Austausch der Rechtsgrundlage
    - norm: § 50 Abs. 1 SGB X
      rolle: Erstattung
    - norm: § 12 Abs. 4 SGB II a.F. (bis 30.06.2026)
      rolle: Karenzzeit-Vermögensfreibetrag 40.000 EUR
    - norm: § 9 Abs. 1 SGB II
      rolle: Hilfebedürftigkeit
    - norm: § 60 Abs. 1 SGB I
      rolle: Mitwirkungs-/Angabepflichten
    calculation:
      input:
        depot_bei_antragstellung: 58000.0
        karenzzeit_freibetrag_af: 40000.0
        bewilligt_monatlich: 1043.0
        monate: 6
      jobcenter_ergebnis:
        erstattungsforderung_gesamt: 6258.0
      expected_korrekt:
        uebersteigendes_vermoegen: 18000.0
        erstattungsforderung_bei_erfolglosem_widerspruch: 6258.0
        rechenfehler_im_bescheid: 0.0
    widerspruchsfrist:
      bescheid_datum: '2026-06-22'
      aufgabe_zur_post: '2026-06-22'
      bekanntgabe_fiktion: '2026-06-26'
      frist_ende_rechnerisch: '2026-07-26'
      frist_ende: '2026-07-27'
      status_am_referenzdatum: offen
    known_traps:
    - 'Kalibrierungs-Case gegen falsche Hoffnung: Die falsche Rechtsgrundlage (§ 48 statt § 45) fühlt sich wie ein Volltreffer
      an, ist aber wegen Austauschbarkeit fast nie erfolgstragend. Die Engine muss ehrlich ''geringe Erfolgsaussichten'' ausgeben.'
    - 'Intertemporal: Auf den Zeitraum 12/2025–05/2026 ist ALTES Vermögensrecht (Karenzzeit, 40.000 EUR) anzuwenden, obwohl
      der Bescheid nach der Reform geprüft wird.'
    - 'Halluzinationsköder: Es gibt KEINEN Rechenfehler im Bescheid — eine Engine, die einen erfindet, fällt durch.'
    actionable_next_steps:
    - Widerspruch bis 27.07.2026 möglich; realistisch nur ergänzende Verteidigungslinien (tatsächliche Verwertbarkeit des
      Depots, Härtefall, Ratenzahlung/Erlassantrag).
    - Ratenzahlungsvereinbarung bzw. Stundung der Erstattungsforderung anregen.
