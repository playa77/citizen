- id: GS-001
  version: 1.0.0
  title: Bewilligungsbescheid — Erwerbstätigenfreibetrag mit veralteter 20%-Staffel berechnet
  category: bewilligung_einkommensanrechnung
  difficulty: mittel
  input_document:
    type: text
    text: |
      Jobcenter Essen
      Kurfürstenstraße 58, 45138 Essen
      BG-Nummer: 56102//0034917
      Team 512 — Frau Beckmann

      Herrn
      Timo Vahrenholt
      Steeler Straße 214
      45138 Essen

      Essen, 06.07.2026

      Bewilligungsbescheid
      Grundsicherungsgeld nach dem Zweiten Buch Sozialgesetzbuch (SGB II)

      Sehr geehrter Herr Vahrenholt,

      auf Ihren Weiterbewilligungsantrag vom 15.06.2026 bewillige ich Ihnen
      für den Zeitraum vom 01.08.2026 bis 31.07.2027 Leistungen in Höhe von
      monatlich 513,00 EUR.

      Berechnung Ihres Anspruchs (monatlich):

      Bedarf:
        Regelbedarf (Regelbedarfsstufe 1)            563,00 EUR
        Kosten der Unterkunft (Grundmiete)           395,00 EUR
        Kalte Betriebskosten                          85,00 EUR
        Heizkosten                                    70,00 EUR
        Gesamtbedarf                               1.113,00 EUR

      Einkommen:
        Erwerbseinkommen (brutto)                  1.100,00 EUR
        Erwerbseinkommen (netto)                     890,00 EUR
        Grundabsetzungsbetrag (§ 11b Abs. 2 SGB II) -100,00 EUR
        Freibetrag 20 % von 420,00 EUR               -84,00 EUR
        Freibetrag 20 % von 480,00 EUR               -96,00 EUR
        Freibetrag 10 % von 100,00 EUR               -10,00 EUR
        Anzurechnendes Einkommen                     600,00 EUR

      Anspruch: 1.113,00 EUR - 600,00 EUR = 513,00 EUR monatlich.

      Die Leistungen werden monatlich im Voraus auf Ihr bekanntes Konto
      überwiesen. Bitte teilen Sie Änderungen in Ihren Verhältnissen
      unverzüglich mit (§ 60 SGB I).

      Rechtsbehelfsbelehrung:
      Gegen diesen Bescheid kann innerhalb eines Monats nach Bekanntgabe
      Widerspruch erhoben werden. Der Widerspruch ist schriftlich oder zur
      Niederschrift beim Jobcenter Essen, Kurfürstenstraße 58, 45138 Essen,
      einzulegen.

      Mit freundlichen Grüßen
      Im Auftrag
      Beckmann
    aufgabe_zur_post: '2026-07-06'
  expected:
    overall_assessment: teilweise_rechtswidrig
    summary: |
      Bewilligung dem Grunde nach korrekt, aber der Erwerbstätigenfreibetrag wurde mit der bis 30.06.2023 geltenden 20%-Staffel für den Einkommensteil 520–1.000 EUR berechnet. Seit 01.07.2023 gilt für diesen Teil 30 % (§ 11b Abs. 3 S. 2 Nr. 2 SGB II). Der Anspruch ist um 48,00 EUR/Monat zu niedrig festgesetzt.
    legal_issues:
    - id: GS-001-I1
      issue: Freibetragsstaffel § 11b Abs. 3 S. 2 Nr. 2 falsch angewendet (20 % statt 30 % für Einkommensteil 520–1.000 EUR)
      assessment: rechtswidrig_zulasten
    - id: GS-001-I2
      issue: Übrige Berechnung (Bedarf, Grundabsetzung, 20%- und 10%-Band) korrekt
      assessment: rechtmaessig
    citations:
    - norm: § 11b Abs. 2 S. 1 SGB II
      rolle: Grundabsetzungsbetrag 100 EUR
    - norm: § 11b Abs. 3 S. 2 Nr. 1-3 SGB II
      rolle: Freibetragsstaffel 20/30/10 %
    - norm: § 20 SGB II
      rolle: Regelbedarf RBS 1
    - norm: § 22 Abs. 1 SGB II
      rolle: Bedarfe für Unterkunft und Heizung
    - norm: § 19 Abs. 3 SGB II
      rolle: Minderung des Bedarfs durch Einkommen
    - norm: § 84 Abs. 1 S. 1 SGG
      rolle: Widerspruchsfrist
    calculation:
      input:
        regelbedarf: 563.0
        kdu_gesamt: 550.0
        gesamtbedarf: 1113.0
        erwerbseinkommen_brutto: 1100.0
        erwerbseinkommen_netto: 890.0
      jobcenter_ergebnis:
        freibetrag_gesamt: 290.0
        anzurechnendes_einkommen: 600.0
        bewilligt_monatlich: 513.0
      expected_korrekt:
        grundabsetzung: 100.0
        fb_20_prozent_band: 84.0
        fb_30_prozent_band: 144.0
        fb_10_prozent_band: 10.0
        freibetrag_gesamt: 338.0
        anzurechnendes_einkommen: 552.0
        anspruch_monatlich: 561.0
        differenz_pro_monat: 48.0
    widerspruchsfrist:
      bescheid_datum: '2026-07-06'
      aufgabe_zur_post: '2026-07-06'
      bekanntgabe_fiktion: '2026-07-10'
      frist_ende: '2026-08-10'
      status_am_referenzdatum: offen
    known_traps:
    - Staffelprozentsätze bemessen sich am BRUTTO-Erwerbseinkommen, abgesetzt wird vom NETTO — Pipeline darf Brutto/Netto
      nicht vertauschen.
    - Die 30%-Stufe für 520–1.000 EUR gilt erst seit 01.07.2023 — Modelle mit älterem Trainingsstand reproduzieren gern die
      20%-Rechnung des Jobcenters und halten den Bescheid für korrekt.
    - Rechtsbehelfsbelehrung ist ordnungsgemäß — keine Jahresfrist; Fristende 10.08.2026 ist ein Montag, kein Rollover nötig.
    actionable_next_steps:
    - Widerspruch bis 10.08.2026 einlegen; konkrete Neuberechnung mit 30%-Band beifügen.
    - Nachzahlung von 48,00 EUR/Monat ab 01.08.2026 geltend machen.
