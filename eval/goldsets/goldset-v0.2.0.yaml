- id: GS-003
  version: 1.0.0
  title: Aufhebungs- und Erstattungsbescheid — Einkommen dem Erarbeitungs- statt Zuflussmonat zugeordnet, Anhörung fehlt
  category: aufhebung_erstattung_48_50
  difficulty: hoch
  input_document:
    type: text
    text: |
      Jobcenter Essen
      BG-Nummer: 56102//0047781
      Team 514 — Frau Jankowski

      Herrn
      Deniz Aydin
      Altendorfer Str. 312
      45143 Essen

      Essen, 08.06.2026

      Bescheid über die teilweise Aufhebung der Leistungsbewilligung
      und Erstattung zu Unrecht erbrachter Leistungen

      Sehr geehrter Herr Aydin,

      mit Bescheid vom 18.11.2025 wurden Ihnen Leistungen nach dem SGB II
      für den Zeitraum 01.12.2025 bis 31.05.2026 in Höhe von monatlich
      1.043,00 EUR bewilligt.

      Im Rahmen des automatisierten Datenabgleichs wurde bekannt, dass Sie
      seit dem 01.02.2026 eine Beschäftigung bei der Fa. Rheinlogistik GmbH
      ausüben. Die Lohnzahlung erfolgt nach Ihrem Arbeitsvertrag jeweils
      nachträglich am dritten Werktag des Folgemonats. Ihr durchschnittliches
      Einkommen beträgt 900,00 EUR brutto / 750,00 EUR netto monatlich.

      Die Bewilligung wird daher für die Monate Februar, März und April 2026
      gemäß § 48 Abs. 1 Satz 2 Nr. 3 SGB X in Verbindung mit § 40 Abs. 2
      Nr. 3 SGB II, § 330 Abs. 3 SGB III teilweise in Höhe von monatlich
      452,00 EUR aufgehoben.

      Die entstandene Überzahlung in Höhe von

          1.356,00 EUR (3 Monate x 452,00 EUR)

      haben Sie gemäß § 50 Abs. 1 SGB X zu erstatten.

      Rechtsbehelfsbelehrung:
      Gegen diesen Bescheid kann innerhalb eines Monats nach Bekanntgabe
      schriftlich oder zur Niederschrift Widerspruch beim Jobcenter Essen
      eingelegt werden.

      Im Auftrag
      Jankowski
    aufgabe_zur_post: '2026-06-08'
  expected:
