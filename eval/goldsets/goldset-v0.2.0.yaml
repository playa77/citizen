- id: GS-005
  version: 1.0.0
  title: Minderungsbescheid nach § 32 SGB II — erstes Meldeversäumnis sanktioniert und alte 10%-Rechtsfolge angewandt
  category: minderung_meldeversaeumnis_32
  difficulty: mittel
  input_document:
    type: text
    text: |
      Jobcenter Essen
      BG-Nummer: 56102//0053110
      Team 515 — Frau Demirci

      Herrn
      Pascal Rothert
      Bocholder Str. 22
      45355 Essen

      Essen, 09.07.2026

      Bescheid über die Feststellung einer Minderung des
      Grundsicherungsgeldes wegen eines Meldeversäumnisses (§ 32 SGB II)

      Sehr geehrter Herr Rothert,

      Sie sind der Einladung zum Meldetermin am 07.07.2026, 09:30 Uhr, bei
      Ihrer Integrationsfachkraft ohne Angabe von Gründen nicht gefolgt.
      Über die Rechtsfolgen eines Meldeversäumnisses waren Sie mit der
      Einladung vom 24.06.2026 schriftlich belehrt worden.

      Ihr Grundsicherungsgeld wird daher gemäß § 32 SGB II für die Dauer
      eines Monats um 10 Prozent des für Sie maßgebenden Regelbedarfs
      gemindert.

      Die Minderung beträgt 56,30 EUR und wird im Auszahlungsmonat
      August 2026 berücksichtigt (Regelbedarf 563,00 EUR, Regelbedarfsstufe 1).

      Hinweis: Ihr Widerspruch hat gemäß § 39 SGB II keine aufschiebende
      Wirkung.

      Rechtsbehelfsbelehrung:
      Gegen diesen Bescheid kann innerhalb eines Monats nach Bekanntgabe
      schriftlich oder zur Niederschrift Widerspruch beim Jobcenter Essen
      eingelegt werden.

      Im Auftrag
      Demirci
    aufgabe_zur_post: '2026-07-09'
    zusatzkontext_nutzer: |
      Herr Rothert gibt an, am 07.07.2026 wegen einer akuten Magen-Darm- Erkrankung beim Hausarzt gewesen zu sein; eine AU-Bescheinigung für den 07.-08.07.2026 liegt vor. Es ist sein erster versäumter Termin; frühere Meldeversäumnisse gab es nicht.
  expected:
    overall_assessment: rechtswidrig
    summary: |
      Doppelt rechtswidrig nach neuem Recht: (1) Seit 01.07.2026 ist das ERSTE Meldeversäumnis nicht mehr sanktionsbewehrt — § 32 Abs. 1 S. 1 SGB II n.F. setzt ein WIEDERHOLTES Versäumnis voraus; hier liegt unstreitig das erste Versäumnis vor. (2) Die angewandte Rechtsfolge (10 % für einen Monat) entstammt dem bis 30.06.2026 geltenden Recht; die neue Rechtsfolge wäre 30 % — greift hier aber mangels Wiederholung ohnehin nicht. (3) Zusätzlich liegt mit der ärztlich attestierten Erkrankung ein wichtiger Grund vor. Die Minderung ist vollständig aufzuheben.
    legal_issues:
    - id: GS-005-I1
      issue: Erstes Meldeversäumnis ist nach § 32 Abs. 1 S. 1 SGB II n.F. (seit 01.07.2026) nicht sanktionsbewehrt — Tatbestand
        'wiederholt' nicht erfüllt
      assessment: rechtswidrig_zulasten
    - id: GS-005-I2
      issue: Anwendung der Rechtsfolge alten Rechts (10 % / 1 Monat) auf einen nach dem 01.07.2026 verwirklichten Sachverhalt
      assessment: rechtswidrig_zulasten
    - id: GS-005-I3
      issue: Wichtiger Grund (akute Erkrankung, AU-Bescheinigung) — schließt Minderung auch bei Wiederholung aus
      assessment: rechtswidrig_zulasten
    - id: GS-005-I4
      issue: Keine aufschiebende Wirkung des Widerspruchs (§ 39 Nr. 1 SGB II) — ggf. Antrag nach § 86b Abs. 1 SGG beim Sozialgericht
      assessment: hinweis
    citations:
    - norm: § 32 Abs. 1 S. 1 SGB II n.F.
      rolle: Minderung erst bei wiederholtem Meldeversäumnis, 30 % für einen Monat
    - norm: § 32 SGB II a.F.
      rolle: vom Jobcenter fälschlich angewandte alte Rechtsfolge (10 %)
    - norm: § 31a Abs. 4 S. 2 SGB II
      rolle: KdU-Zahlbeträge durch Minderung nicht reduzierbar
    - norm: § 39 Nr. 1 SGB II
      rolle: keine aufschiebende Wirkung
    - norm: § 86b Abs. 1 SGG
      rolle: einstweiliger Rechtsschutz
    - norm: § 84 Abs. 1 S. 1 SGG
      rolle: Widerspruchsfrist
    calculation:
      input:
        regelbedarf: 563.0
      jobcenter_ergebnis:
        minderung_monatlich: 56.3
        minderung_dauer_monate: 1
      expected_korrekt:
        minderung_rechtmaessig: 0.0
        hinweis_neue_rechtsfolge_bei_wiederholung: 168.9
    widerspruchsfrist:
      bescheid_datum: '2026-07-09'
      aufgabe_zur_post: '2026-07-09'
      bekanntgabe_fiktion: '2026-07-13'
      frist_ende: '2026-08-13'
      status_am_referenzdatum: offen
    known_traps:
    - 'Rechtslagen-Falle: Modelle mit Trainingsstand vor 2026 kennen die Bürgergeld-Staffel (10/20/30 %) und halten den Bescheid
      für rechtmäßig oder monieren nur den wichtigen Grund. Kernfehler ist der Tatbestand (''wiederholt'') des neuen Rechts.'
    - Bekanntgabe erfolgt hier am 13.07.2026 — NACH dem Referenzdatum 11.07.2026. Die Engine muss mit noch nicht bekannt gegebenen,
      aber vorliegenden Bescheiden umgehen können (Frist läuft noch gar nicht).
    - Die 30%-Zahl (168,90 EUR) darf NICHT als 'korrekte Minderung' ausgegeben werden — mangels Wiederholung ist die rechtmäßige
      Minderung 0,00 EUR.
    actionable_next_steps:
    - Widerspruch einlegen (Frist bis 13.08.2026); AU-Bescheinigung beifügen.
    - Aufhebung der Minderung und ungekürzte Auszahlung für August 2026 verlangen; bei Nichtabhilfe Eilantrag nach § 86b SGG
      prüfen.
