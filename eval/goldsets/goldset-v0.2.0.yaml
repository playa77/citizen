- id: GS-008
  version: 1.0.0
  title: Ablehnungsbescheid wegen Vermögens — Karenzzeit-Freibetrag alten Rechts (40.000 EUR) übergangen, Riester-Vermögen
    mitgezählt
  category: ablehnung_vermoegen
  difficulty: hoch
  input_document:
    type: text
    text: |
      Jobcenter Essen
      BG-Nummer: 56102//0057240
      Team 511 — Herr Brandhoff

      Frau
      Iris Wallenstein
      Huttropstr. 9
      45138 Essen

      Essen, 18.06.2026

      Ablehnungsbescheid

      Sehr geehrte Frau Wallenstein,

      Ihren Antrag vom 04.05.2026 auf Leistungen zur Sicherung des
      Lebensunterhalts nach dem SGB II lehne ich ab.

      Begründung:
      Sie verfügen ausweislich der eingereichten Unterlagen über folgendes
      Vermögen:

        Tagesgeldkonto Sparkasse Essen              24.500,00 EUR
        Riester-Rentenversicherung (gefördert,
        Rückkaufswert)                              12.000,00 EUR
        Summe                                       36.500,00 EUR

      Damit übersteigt Ihr Vermögen den maßgebenden Freibetrag von
      15.000,00 EUR erheblich. Sie sind nicht hilfebedürftig im Sinne des
      § 9 SGB II und haben keinen Leistungsanspruch. Sie sind gehalten,
      zunächst Ihr Vermögen für den Lebensunterhalt einzusetzen.

      Rechtsbehelfsbelehrung:
      Gegen diesen Bescheid kann innerhalb eines Monats nach Bekanntgabe
      schriftlich oder zur Niederschrift Widerspruch beim Jobcenter Essen
      eingelegt werden.

      Im Auftrag
      Brandhoff
    aufgabe_zur_post: '2026-06-18'
    zusatzkontext_nutzer: |
      Frau Wallenstein ist 52 Jahre alt, alleinstehend, erstmals im Leistungsbezug (Antragstellung 04.05.2026 nach Auslaufen des ALG I).
  expected:
    overall_assessment: rechtswidrig
    summary: |
      Doppelfehler: (1) Für den Leistungszeitraum ab Antragstellung (04.05.2026) bis 30.06.2026 gilt ALTES Recht: In der 12-monatigen Karenzzeit beträgt der Vermögensfreibetrag 40.000,00 EUR (§ 12 Abs. 4 SGB II a.F.) — nicht 15.000,00 EUR. (2) Die geförderte Riester-Rentenversicherung ist ohnehin privilegiertes Altersvorsorge- vermögen (§ 12 Abs. 3 SGB II a.F.) und bleibt unberücksichtigt. Verwertbares Vermögen: 24.500,00 EUR < 40.000,00 EUR — die Ablehnung für Mai/Juni 2026 ist rechtswidrig. Für Zeiträume ab 01.07.2026 gilt neues Recht (altersgestaffelter Freibetrag ohne Karenzzeit); der für eine 52-Jährige maßgebende Betrag ist gegen den Gesetzestext zu verifizieren (siehe open_questions OQ-3) — die Engine muss diese Unsicherheit ausweisen statt einen Betrag zu erfinden.
    legal_issues:
    - id: GS-008-I1
      issue: 'Intertemporal falscher Freibetrag: Für Mai/Juni 2026 gilt der Karenzzeit-Freibetrag von 40.000 EUR (§ 12 Abs.
        4 SGB II a.F.), nicht der Nach-Karenzzeit-Betrag von 15.000 EUR'
      assessment: rechtswidrig_zulasten
    - id: GS-008-I2
      issue: Gefördertes Riester-Altersvorsorgevermögen als verwertbares Vermögen angesetzt (privilegiert nach § 12 Abs. 3
        SGB II a.F.)
      assessment: rechtswidrig_zulasten
    - id: GS-008-I3
      issue: Für Bewilligungsabschnitte ab 01.07.2026 ist die neue altersgestaffelte Freibetragssystematik (§ 12 SGB II n.F.)
        anzuwenden; Betrag für 52-Jährige gegen Primärquelle zu prüfen — getrennte Prüfung der Zeiträume erforderlich
      assessment: prüfauftrag
    citations:
    - norm: § 12 Abs. 4 SGB II a.F. (bis 30.06.2026)
      rolle: Karenzzeit-Freibetrag 40.000 EUR erste Person
    - norm: § 12 Abs. 3 SGB II a.F.
      rolle: Privilegierung geförderten Altersvorsorgevermögens (Riester)
    - norm: § 12 SGB II n.F. (ab 01.07.2026)
      rolle: altersgestaffelte Freibeträge ohne Karenzzeit — für Folgezeiträume
    - norm: § 9 Abs. 1 SGB II
      rolle: Hilfebedürftigkeit
    - norm: § 37 SGB II
      rolle: Antragserfordernis / Leistungsbeginn ab Antragsmonat
    - norm: § 84 Abs. 1 S. 1 SGG
      rolle: Widerspruchsfrist
    calculation:
      input:
        tagesgeld: 24500.0
        riester_rueckkaufswert: 12000.0
        antragsdatum: '2026-05-04'
        alter_antragstellerin: 52
      jobcenter_ergebnis:
        angesetztes_vermoegen: 36500.0
        angewandter_freibetrag: 15000.0
      expected_korrekt:
        verwertbares_vermoegen: 24500.0
        freibetrag_mai_juni_2026: 40000.0
        hilfebeduerftigkeit_mai_juni: ja
        freibetrag_ab_juli_2026: verifizieren_gegen_bgbl_2026_i_107
    widerspruchsfrist:
      bescheid_datum: '2026-06-18'
      aufgabe_zur_post: '2026-06-18'
      bekanntgabe_fiktion: '2026-06-22'
      frist_ende: '2026-07-22'
      status_am_referenzdatum: offen
    known_traps:
    - 'Intertemporale Doppellage: Ein Antrag von Mai 2026 spannt sich über den Rechtswechsel am 01.07.2026 — die Engine muss
      den Anspruch zeitraumbezogen nach zwei verschiedenen Rechtslagen prüfen.'
    - 'Epistemik-Test: Die neuen Altersstaffel-Beträge sind in Sekundärquellen uneinheitlich — die korrekte Ausgabe ist ein
      gekennzeichneter Prüfauftrag, KEIN erfundener Betrag.'
    - Riester-Privilegierung gilt nach a.F. eindeutig; ob/wie die n.F. Altersvorsorge einbezieht, ist gegen den Gesetzestext
      zu prüfen — auch hier keine Erfindung.
    actionable_next_steps:
    - 'Widerspruch bis 22.07.2026: Karenzzeit-Freibetrag 40.000 EUR und Riester-Privilegierung für Mai/Juni 2026 geltend machen.'
    - Nachzahlung ab Antragsmonat Mai 2026 fordern; für Zeiträume ab Juli 2026 Neubescheidung nach neuem Recht verlangen.
